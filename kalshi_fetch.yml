# .github/workflows/kalshi_fetch.yml
#
# Roda nos servidores do GitHub (US) e commita os dados no repositório.
# Coloque este arquivo em: .github/workflows/kalshi_fetch.yml
#
# Disparo:
#   - A cada hora (automático)
#   - Manual via "Run workflow" na aba Actions do GitHub

name: Kalshi WC Markets Fetch

on:
  schedule:
    - cron: "0 * * * *"   # todo início de hora (UTC)
  workflow_dispatch:        # disparo manual

jobs:
  fetch:
    runs-on: ubuntu-latest  # servidores nos EUA

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar fetch
        run: python kalshi_fetch_wc_actions.py

      - name: Commit e push dos dados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kalshi_wc_markets.json kalshi_wc_markets.csv
          git diff --cached --quiet || git commit -m "chore: atualiza mercados Kalshi $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
