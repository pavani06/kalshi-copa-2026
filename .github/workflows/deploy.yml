name: Atualizar e publicar dashboard

# Roda de hora em hora (UTC), no push pra main, e sob demanda pelo botao "Run workflow".
on:
  schedule:
    - cron: "0 * * * *"   # minuto 0 de toda hora (horario UTC)
  push:
    branches: [main]
  workflow_dispatch:

# Permissoes necessarias para publicar no GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# So um deploy por vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Buscar odds da Kalshi e gerar o HTML
        run: python kalshi_update.py --no-xlsx

      - name: Montar o site (index.html)
        run: |
          mkdir -p _site
          cp kalshi_dashboard.html _site/index.html

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
