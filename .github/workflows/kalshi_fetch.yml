# kalshi_fetch.yml
name: Kalshi WC Markets Fetch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python kalshi_fetch_wc_actions.py
      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kalshi_wc_markets.json kalshi_wc_markets.csv
          git diff --cached --quiet || git commit -m "atualiza mercados Kalshi"
          git push
