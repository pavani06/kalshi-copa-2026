# kalshi_fetch.yml
name: Kalshi WC Markets Fetch

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests

      - name: Fetch mercados Kalshi
        run: python kalshi_fetch_wc_actions.py

      - name: Salvar snapshot de preços
        run: |
          python salvar_snapshot.py || echo "[WARN] salvar_snapshot.py falhou"

      - name: Fetch notícias de impacto
        run: |
          python fetch_news.py || echo "[WARN] fetch_news.py falhou"

      - name: Atualizar STATE.md com timestamp Kalshi
        run: |
          python - << 'PYEOF'
          import json, re
          from datetime import datetime, timezone

          try:
              with open('kalshi_wc_markets.json', encoding='utf-8') as f:
                  markets = json.load(f)
              ts = None
              if isinstance(markets, list) and markets:
                  ts = markets[0].get('fetched_at', '')
              elif isinstance(markets, dict):
                  ts = markets.get('fetched_at', '')
              kalshi_ts = ts or datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          except Exception:
              kalshi_ts = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          try:
              with open('STATE.md', encoding='utf-8') as f:
                  content = f.read()
              new_line = f"> Última atualização Kalshi (Actions): `{kalshi_ts}`"
              if "Última atualização Kalshi (Actions)" in content:
                  content = re.sub(
                      r'> Última atualização Kalshi \(Actions\):.*',
                      new_line, content
                  )
              else:
                  content = content.replace(
                      "> Fase: Grupos (Rodada 2)\n",
                      f"> Fase: Grupos (Rodada 2)\n{new_line}\n"
                  )
              with open('STATE.md', 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"[OK] STATE.md: {kalshi_ts}")
          except Exception as e:
              print(f"[WARN] STATE.md: {e}")
          PYEOF

      - name: Regenerar dashboard HTML
        run: |
          python gerar_dashboard.py || echo "[WARN] gerar_dashboard.py falhou"

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kalshi_wc_markets.json kalshi_wc_markets.csv
          git add STATE.md news_events.json kalshi_dashboard.html
          git add historico_precos.csv historico/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: Kalshi + news + dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
